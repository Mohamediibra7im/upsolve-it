name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend--upsolve-it/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend--upsolve-it
      run: npm ci
    
    - name: Run ESLint
      working-directory: frontend--upsolve-it
      run: npm run lint
    
    - name: Run tests
      working-directory: frontend--upsolve-it
      run: npm test
    
    - name: Build Next.js app
      working-directory: frontend--upsolve-it
      run: npm run build
      env:
        NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

  backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend--upsolve-it/package-lock.json
    
    - name: Install dependencies
      working-directory: backend--upsolve-it
      run: npm ci
    
    - name: Run ESLint
      working-directory: backend--upsolve-it
      run: npm run lint
    
    - name: Build NestJS app
      working-directory: backend--upsolve-it
      run: npm run build
      env:
        NODE_ENV: production
        PORT: 5000
        FRONTEND_ORIGIN: http://localhost:3000
        JWT_SECRET: ci-test-secret-at-least-32-characters
        JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32
        MONGODB_URI: mongodb://localhost:27017/test
